worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Increase buffer sizes for large biometric payloads (photos, FP BMP, iris BMP)
    client_max_body_size 20M;
    proxy_buffer_size        16k;
    proxy_buffers         8 16k;
    proxy_busy_buffers_size  32k;

    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 1000;
    gzip_comp_level 5;
    gzip_vary on;

    upstream fastapi {
        server server:8000;
        keepalive 32;
    }

    upstream admin_panel {
        server admin-panel:3000;
    }

    upstream supervisor_panel {
        server supervisor-panel:3001;
    }

    server {
        listen 80;

        # ── API routes ─────────────────────────────────────────────────────
        # All FastAPI paths go directly to the server container
        location /admin/ {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /supervisor/ {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /operator/ {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /load/ {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /docs {
            proxy_pass         http://fastapi;
            proxy_set_header   Host $host;
        }

        location /openapi.json {
            proxy_pass         http://fastapi;
            proxy_set_header   Host $host;
        }

        # ── Supervisor Panel static files ──────────────────────────────────
        # Served under /sp/ prefix; strip the prefix before forwarding
        location /sp/ {
            proxy_pass         http://supervisor_panel/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Admin Panel static files (root) ───────────────────────────────
        location / {
            proxy_pass         http://admin_panel;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}
